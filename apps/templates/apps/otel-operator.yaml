apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts      #https://github.com/open-telemetry/opentelemetry-helm-charts/blob/opentelemetry-operator-0.108.0/charts/opentelemetry-operator/README.md
    chart: opentelemetry-operator
    targetRevision: 0.108.0
    helm:
      values: |
        manager:
          collectorImage:
            repository: otel/opentelemetry-collector-k8s
            tag: "0.148.0"  # Latest stable
        admissionWebhooks:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: opentelemetry-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
