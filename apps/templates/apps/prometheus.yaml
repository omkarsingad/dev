apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-operator-crds
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts  # Helm repo [web:21]
    chart: prometheus-operator-crds/charts
    targetRevision: "28.0.1"  # Latest minimal bundle
    helm:
      releaseName: prometheus-operator-crds
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - Replace=true
      - ServerSideApply=true
