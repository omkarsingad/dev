apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-operator-crds
  namespace: argocd
spec:
  project: default

  source:
    repoURL: oci://ghcr.io/prometheus-community/charts/prometheus-operator-crds
    chart: prometheus-operator-crds
    targetRevision: 1.3.0   # pin version (IMPORTANT)

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - Replace=true
